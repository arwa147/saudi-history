<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>المكتبة</title>

<!-- خط Cairo -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --green:#006C35;
  --purple:#8A73B3;
  --bg:#F4F1FA;
  --white:#fff;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Cairo', sans-serif;
}

body{
  background:var(--bg);
}

/* ===== الهيدر ===== */
header{
  background:var(--green);
  color:white;
  padding:18px 30px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

header a{
  color:white;
  text-decoration:none;
  margin:0 10px;
  font-weight:600;
}

header a:hover{
  color:var(--purple);
}

/* ===== عنوان ===== */
.title{
  text-align:center;
  margin:30px 0;
  font-size:28px;
  color:var(--green);
  animation:fadeIn 1s ease;
}

/* ===== grid ===== */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:25px;
  padding:30px;
}

/* ===== card احترافي ===== */
.card{
  background:rgba(255,255,255,0.8);
  backdrop-filter: blur(10px);
  padding:25px;
  border-radius:18px;
  border:1px solid rgba(0,0,0,0.05);
  border-top:5px solid var(--purple);
  box-shadow:0 8px 20px rgba(0,0,0,0.05);
  transition:0.4s;
  opacity:0;
  transform:translateY(20px);
}

/* ظهور تدريجي */
.card.show{
  opacity:1;
  transform:translateY(0);
}

/* hover */
.card:hover{
  transform:translateY(-8px) scale(1.02);
  border-top-color:var(--green);
}

/* النص */
.card h3{
  color:var(--green);
  margin-bottom:10px;
}

.card p{
  color:#555;
  margin-bottom:15px;
}

/* زر */
.card a{
  display:block;
  text-align:center;
  background:var(--purple);
  color:white;
  padding:10px;
  border-radius:12px;
  text-decoration:none;
  transition:0.3s;
}

.card a:hover{
  background:var(--green);
}

/* ===== أنيميشن ===== */
@keyframes fadeIn{
  from{opacity:0;}
  to{opacity:1;}
}
</style>
</head>

<body>

<header>
  <h2>المكتبة</h2>
  <nav>
    <a href="index.html">الرئيسية</a>
  </nav>
</header>

<h1 class="title">رفوف حكايا وحضارة </h1>

<div class="grid">

  <div class="card">
    <h3>الدولة السعودية الأولى</h3>
    <p>حكاية وطن بدأ من هنا</p>
    <a href="story.html">اقرأ القصة</a>
  </div>

  <div class="card">
    <h3>الدولة السعودية الثانية</h3>
    <p>حكاية عودة أعادت المجد</p>
    <a href="story2.html">اقرأ القصة</a>
  </div>

  <div class="card">
    <h3>الدولة السعودية الثالثة</h3>
    <p>حكاية وطن اكتمل بناؤه</p>
    <a href="story3.html">اقرأ القصة</a>
  </div>

</div>

<!-- JavaScript بسيط للتأثير -->
<script>
const cards = document.querySelectorAll(".card");

cards.forEach((card, i) => {
  setTimeout(() => {
    card.classList.add("show");
  }, i * 200);
});
</script>

</body>
</html>
